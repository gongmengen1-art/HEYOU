# Copy to config.yaml and fill in your secrets. config.yaml is gitignored.
comfyui:
  comfyui_url: http://127.0.0.1:8188
  comfyui_api_key: null
  runninghub_api_key: YOUR_RUNNINGHUB_API_KEY
  runninghub_concurrent_limit: 1
  runninghub_instance_type: null

generation:
  backend: mock                 # mock | runninghub
  runninghub:
    base_url: https://www.runninghub.cn
    workflow_id: ""
    poll_interval_sec: 3
    timeout_sec: 240
    input_image_node_id: ""
    seed_node_id: ""
    prompt_node_id: ""

camera:
  device_index: 0
  frame_width: 1280
  frame_height: 720
  fps_limit: 8

recognition:
  model_pack: buffalo_l
  providers: [CPUExecutionProvider]   # cross-platform CPU. mac Neural Engine: prepend CoreMLExecutionProvider. Windows GPU: install onnxruntime-directml and use DmlExecutionProvider
  ctx_id: -1
  det_size: 640
  match_threshold: 0.45
  min_face_px: 90
  recognize_interval_sec: 0.4

orchestration:
  debounce_sec: 5
  daily_limit: 1
  gallery_reload_sec: 10

server:
  host: 127.0.0.1
  port: 8000

printing:
  enabled: false                # auto-print after generation (manual /api/print ignores this)
  backend: system               # system = OS printer (CUPS on mac/Linux, win32print on Windows) | pixcut = Liene-app UI automation (mac + Windows)
  printer_name: ""              # system backend; empty = OS default printer (mac: `lpstat -p` / Windows: Settings → Printers)
  pixcut:                       # backend=pixcut. mac -> pixcut-probe/print_via_app.sh; Windows -> pixcut-probe/pixcut_win.py
    script: pixcut-probe/print_via_app.sh   # mac driver; Windows ignores this (uses pixcut_win.py)
    dry_run: false              # DEBUG: run whole flow but never click 切割 (no print/ribbon), log success
    cutout: false               # apply AI抠图 die-cut each print (uses a trial credit) — macOS only
    fresh: true                 # mac: navigate Home->blank 4x7 canvas each print (Windows always restarts)
    margin_in: 0.0
    timeout_sec: 300            # Windows uses max(this, 480) internally
    restart_every: 10           # mac: restart Liene app every N prints to clear 画板 tabs (0 = never); Windows self-restarts

storage:
  data_dir: ./data
  history_retention_days: 3     # purge generation history + images older than N days

logging:                        # rotating file logs under data_dir/logs, self-cleaning
  level: INFO
  max_bytes: 5000000            # rotate each log file at ~5MB
  backup_count: 5               # keep N rotations (~25MB hard cap); oldest auto-deleted
  retention_days: 7             # also prune *.log* older than N days on startup (0 = off)
